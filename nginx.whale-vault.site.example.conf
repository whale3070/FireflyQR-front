# 生产站点 Nginx 示例（由线上 whale-vault.conf 整理，域名与路径请按环境替换）
#
# 用法（Debian/Ubuntu）：
#   sudo cp nginx.whale-vault.site.example.conf /etc/nginx/sites-available/whale-vault.conf
#   sudo sed -i 's/CHANGEME_DOMAIN/example.com/g' /etc/nginx/sites-available/whale-vault.conf
#   sudo sed -i 's|CHANGEME_WEB_ROOT|/var/www/whale-vault|g' /etc/nginx/sites-available/whale-vault.conf
#   sudo ln -sf /etc/nginx/sites-available/whale-vault.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 前置条件：
#   - 前端：npm run build 后 dist 同步到 CHANGEME_WEB_ROOT（与 whale-deploy.sh 一致）
#   - 后端：Go 服务监听 127.0.0.1:8080（或改下面所有 proxy_pass 端口）
#

server {
    listen 80;
    server_name CHANGEME_DOMAIN www.CHANGEME_DOMAIN;

    root CHANGEME_WEB_ROOT;
    index index.html;

    access_log /var/log/nginx/CHANGEME_DOMAIN.access.log;
    error_log  /var/log/nginx/CHANGEME_DOMAIN.error.log;

    # ---------------------------------------------------------
    # 安全：防扫常见敏感路径
    # ---------------------------------------------------------
    location = /.env { return 404; }
    location = /.git { return 404; }
    location ^~ /.git/ { return 404; }

    # ---------------------------------------------------------
    # 反代默认头（各 location 内会再显式设置，保证真实 IP 传给后端）
    # ---------------------------------------------------------
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # ---------------------------------------------------------
    # 静态特例
    # ---------------------------------------------------------
    location = /conflux-faucet-plugin.js {
        root CHANGEME_WEB_ROOT;
        try_files /conflux-faucet-plugin.js =404;
        default_type application/javascript;
        add_header Cache-Control "public, max-age=3600";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------------------------------------------------------
    # 后端：必须传真实 IP（扫码 / 纯真 IP / GeoIP）
    # ---------------------------------------------------------
    location ^~ /secret/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /relay/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 链上部署等 receipt：需长于后端等待时间，避免 504
    location = /api/v1/publisher/deploy-book {
        proxy_pass http://127.0.0.1:8080;
        proxy_connect_timeout 30s;
        proxy_send_timeout 360s;
        proxy_read_timeout 360s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/publisher/zip {
        proxy_pass http://127.0.0.1:8080;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------
    # SPA：其余走静态 + index.html
    # ---------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}

# 若接 Cloudflare 等 CDN，需在 server 内增加 set_real_ip_from + real_ip_header CF-Connecting-IP，
# 参见你当前线上注释块（本文件为缩短未展开全量 CF 网段）。
